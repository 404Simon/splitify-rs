name: Create Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-edit
        run: cargo binstall cargo-edit --no-confirm --locked

      - name: Bump version in Cargo.toml
        id: bump_version
        env:
          BUMP_TYPE: ${{ inputs.bump }}
        run: |
          CURRENT=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "$BUMP_TYPE" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
            *) echo "Unsupported bump type: $BUMP_TYPE"; exit 1 ;;
          esac

          NEW_VERSION="${major}.${minor}.${patch}"

          cargo set-version "$NEW_VERSION"

          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version was updated
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          EXPECTED_VERSION="${{ steps.bump_version.outputs.new_version }}"

          if [ "$CARGO_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Error: Version mismatch. Expected $EXPECTED_VERSION but got $CARGO_VERSION"
            exit 1
          fi

          echo "Version successfully updated to $CARGO_VERSION"

      - name: Commit and tag
        env:
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${NEW_VERSION} [no ci]"

          git tag "v${NEW_VERSION}"

          git push
          git push origin "v${NEW_VERSION}"

          echo "## Version Bump Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${NEW_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: $(git rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v${NEW_VERSION}" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_VERSION: ${{ steps.bump_version.outputs.new_version }}
        run: |
          gh release create "v${NEW_VERSION}" \
            --draft=false \
            --latest \
            --generate-notes \
            --title "Release v${NEW_VERSION}" \
            --notes "This release was automatically created by GitHub Actions.

          ## Installation

          ### Docker Compose
          
          Download the \`docker-compose.yml\` and the \`.env.example\`, rename it to \`.env\`, create a \`data\` directory and start it.

          \`\`\`bash
          docker compose up -d
          \`\`\`

          ### Docker

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:v${NEW_VERSION}
          docker run -p 8080:8080 -v ./data:/app/data ghcr.io/${{ github.repository }}:v${NEW_VERSION}
          \`\`\`

          ### Binary

          Download the binary assets below, extract it, and run:
          \`\`\`bash
          ./run.sh
          \`\`\`"
